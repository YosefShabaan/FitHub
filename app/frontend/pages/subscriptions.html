<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitHub — Subscriptions</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/members.css"/>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">Fit<span>Hub</span></div>
      <div class="logo-sub">Management Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="dashboard.html" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="members.html" class="nav-item">
        <span class="icon">👥</span> Members
      </a>
      <a href="subscriptions.html" class="nav-item active">
        <span class="icon">💳</span> Subscriptions
      </a>
      <div class="nav-section" style="margin-top:16px">Portal</div>
      <a href="index.html" class="nav-item" target="_blank">
        <span class="icon">🏋️</span> Member Portal
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div class="user-name" id="username-display">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="page-title">Subscriptions</div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div style="font-size:14px;color:#888">
          All member subscriptions — auto-expire is applied automatically
        </div>
        <button class="btn-primary" onclick="openAdd()">+ ADD SUBSCRIPTION</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Member ID</th>
              <th>Plan</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="subs-body">
            <tr><td colspan="7" style="text-align:center;color:#bbb;padding:30px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">ADD SUBSCRIPTION</div>
      <div class="form-group">
        <label>Member ID *</label>
        <input type="number" id="sub-member-id" placeholder="e.g. 1"/>
      </div>
      <div class="form-group">
        <label>Plan *</label>
        <select id="sub-plan">
          <option value="monthly">Monthly (30 days)</option>
          <option value="yearly">Yearly (365 days)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Start Date *</label>
        <input type="date" id="sub-start"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" onclick="saveSubscription()">SAVE</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../js/subscriptions.js"></script>
</body>
</html>
