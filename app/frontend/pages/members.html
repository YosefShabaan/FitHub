<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitHub — Members</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/members.css"/>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">Fit<span>Hub</span></div>
      <div class="logo-sub">Management Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="dashboard.html" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="members.html" class="nav-item active">
        <span class="icon">👥</span> Members
      </a>
      <a href="subscriptions.html" class="nav-item">
        <span class="icon">💳</span> Subscriptions
      </a>
      <div class="nav-section" style="margin-top:16px">Portal</div>
      <a href="index.html" class="nav-item" target="_blank">
        <span class="icon">🏋️</span> Member Portal
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div class="user-name" id="username-display">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="page-title">Members</div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search by name or phone..." oninput="onSearch(event)"/>
        </div>
        <button class="btn-primary" onclick="openAdd()">+ ADD MEMBER</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="members-body">
            <tr><td colspan="5" style="text-align:center;color:#bbb;padding:30px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modal-title">ADD MEMBER</div>
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="member-name" placeholder="e.g. Ahmed Ali"/>
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <input type="text" id="member-phone" placeholder="e.g. 01012345678"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="member-email" placeholder="e.g. ahmed@email.com"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" onclick="saveMember()">SAVE</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../js/members.js"></script>
</body>
</html>
